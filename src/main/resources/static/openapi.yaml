openapi: 3.0.3
info:
  title: Mini Numbers Analytics API
  description: |
    Privacy-first, minimalist web analytics API. No cookies, no PII storage.
    All admin endpoints require session authentication via /api/login.
  version: 1.0.0
  license:
    name: MIT

servers:
  - url: https://analytics.example.com
    description: Production deployment
  - url: http://localhost:8080
    description: Local development

paths:
  /health:
    get:
      summary: Health check
      tags: [System]
      responses:
        '200':
          description: Service healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: healthy }
                  state: { type: string, example: READY }
                  uptime_seconds: { type: integer }
                  version: { type: string }
        '503':
          description: Service unavailable

  /metrics:
    get:
      summary: Application metrics
      tags: [System]
      responses:
        '200':
          description: Metrics data
          content:
            application/json:
              schema:
                type: object
                properties:
                  uptime_seconds: { type: integer }
                  total_events: { type: integer }
                  total_projects: { type: integer }
                  cache_size: { type: integer }
                  hash_rotation_hours: { type: integer }
                  privacy_mode: { type: string }
                  data_retention_days: { type: integer }

  /tracker/config:
    get:
      summary: Tracker configuration
      tags: [System]
      responses:
        '200':
          description: Tracker settings
          content:
            application/json:
              schema:
                type: object
                properties:
                  heartbeatInterval: { type: integer, example: 30 }
                  spaEnabled: { type: boolean, example: true }

  /collect:
    post:
      summary: Collect analytics event
      tags: [Data Collection]
      parameters:
        - name: X-Project-Key
          in: header
          required: false
          schema: { type: string }
        - name: key
          in: query
          required: false
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PageViewPayload'
      responses:
        '202': { description: Event accepted }
        '400':
          description: Validation error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiError' }
        '404': { description: Invalid API key }
        '429': { description: Rate limit exceeded }

  /api/token:
    post:
      summary: Get JWT access + refresh tokens
      description: Authenticate with username/password and receive a short-lived access token (15 min) and a long-lived refresh token (7 days). Use the Bearer token in the Authorization header for subsequent requests.
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username: { type: string }
                password: { type: string }
      responses:
        '200':
          description: Tokens issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken: { type: string }
                  refreshToken: { type: string }
                  tokenType: { type: string, example: Bearer }
                  expiresIn: { type: integer, example: 900 }
        '401': { description: Invalid credentials }

  /api/token/refresh:
    post:
      summary: Rotate refresh token
      description: Exchange a valid refresh token for a new access token and a new refresh token. The old refresh token is immediately revoked (token rotation).
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken: { type: string }
      responses:
        '200':
          description: New tokens issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken: { type: string }
                  refreshToken: { type: string }
                  tokenType: { type: string }
                  expiresIn: { type: integer }
        '401': { description: Invalid or expired refresh token }

  /api/password-reset:
    post:
      summary: Reset admin password
      description: Reset the admin password using the server salt as proof of server ownership. Invalidates all active sessions and refresh tokens.
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [newPassword, serverSalt]
              properties:
                newPassword: { type: string, minLength: 8 }
                serverSalt: { type: string, description: Must match SERVER_SALT in your .env }
      responses:
        '200': { description: Password updated, all sessions invalidated }
        '400': { description: Password too short }
        '403': { description: Invalid server salt }

  /admin/me:
    get:
      summary: Current authenticated user
      tags: [Authentication]
      security:
        - sessionCookie: []
        - bearerAuth: []
      responses:
        '200':
          description: Current user info
          content:
            application/json:
              schema:
                type: object
                properties:
                  username: { type: string }
                  role: { type: string, enum: [admin, viewer] }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /admin/users:
    get:
      summary: List all users
      tags: [User Management]
      security:
        - sessionCookie: []
        - bearerAuth: []
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/UserResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      summary: Create a new user
      tags: [User Management]
      security:
        - sessionCookie: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password, role]
              properties:
                username: { type: string, maxLength: 100 }
                password: { type: string, minLength: 8 }
                role: { type: string, enum: [admin, viewer] }
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string, format: uuid }
                  success: { type: boolean }
        '400': { description: Validation error }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { description: Username already exists }

  /admin/users/{userId}/role:
    put:
      summary: Update user role
      tags: [User Management]
      security:
        - sessionCookie: []
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role: { type: string, enum: [admin, viewer] }
      responses:
        '200': { description: Role updated }
        '400': { description: Invalid role }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { description: User not found }

  /admin/users/{userId}:
    delete:
      summary: Delete user
      tags: [User Management]
      security:
        - sessionCookie: []
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204': { description: User deleted }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { description: User not found }

  /api/login:
    post:
      summary: Admin login
      tags: [Authentication]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username: { type: string }
                password: { type: string }
      responses:
        '200': { description: Login successful }
        '401': { description: Invalid credentials }

  /api/logout:
    post:
      summary: Admin logout
      tags: [Authentication]
      responses:
        '200': { description: Logged out }

  /admin/projects:
    get:
      summary: List all projects
      tags: [Projects]
      parameters:
        - name: page
          in: query
          schema: { type: integer }
        - name: limit
          in: query
          schema: { type: integer }
      responses:
        '200':
          description: Projects list
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Project' }
    post:
      summary: Create project
      tags: [Projects]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [name, domain]
              properties:
                name: { type: string }
                domain: { type: string }
      responses:
        '201': { description: Created }
        '400': { description: Invalid input }

  /admin/projects/{id}:
    post:
      summary: Update project
      tags: [Projects]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
      responses:
        '200': { description: Updated }
    delete:
      summary: Delete project and all data
      tags: [Projects]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204': { description: Deleted }

  /admin/projects/{id}/stats:
    get:
      summary: Basic project statistics
      tags: [Analytics]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Stats data
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProjectStats' }

  /admin/projects/{id}/report:
    get:
      summary: Full analytics report
      tags: [Analytics]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: filter
          in: query
          schema: { type: string, enum: ['24h', '3d', '7d', '30d', '365d'], default: '7d' }
      responses:
        '200': { description: Full report }

  /admin/projects/{id}/report/comparison:
    get:
      summary: Comparison report (current vs previous period)
      tags: [Analytics]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: filter
          in: query
          schema: { type: string, enum: ['24h', '3d', '7d', '30d', '365d'], default: '7d' }
      responses:
        '200': { description: Comparison report with time series }

  /admin/projects/{id}/calendar:
    get:
      summary: 365-day contribution calendar
      tags: [Analytics]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Calendar data }

  /admin/projects/{id}/live:
    get:
      summary: Live visitor feed (last 5 minutes)
      tags: [Analytics]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Live visitors
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/VisitSnippet' }

  /admin/projects/{id}/events:
    get:
      summary: Raw events with pagination
      tags: [Analytics]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: page
          in: query
          schema: { type: integer, default: 0 }
        - name: limit
          in: query
          schema: { type: integer, default: 50, maximum: 1000 }
        - name: filter
          in: query
          schema: { type: string, enum: ['pageview', 'heartbeat', 'custom'] }
        - name: sortBy
          in: query
          schema: { type: string, enum: ['timestamp', 'path', 'country', 'browser'] }
        - name: order
          in: query
          schema: { type: string, enum: ['asc', 'desc'] }
      responses:
        '200':
          description: Paginated events
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RawEventsResponse' }

  /admin/projects/{id}/goals:
    get:
      summary: List conversion goals
      tags: [Goals]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Goals list }
    post:
      summary: Create conversion goal
      tags: [Goals]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [name, goalType, matchValue]
              properties:
                name: { type: string }
                goalType: { type: string, enum: ['url', 'event'] }
                matchValue: { type: string }
      responses:
        '201': { description: Created }

  /admin/projects/{id}/goals/stats:
    get:
      summary: Goal conversion statistics
      tags: [Goals]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: filter
          in: query
          schema: { type: string, default: '7d' }
      responses:
        '200': { description: Goal stats }

  /admin/projects/{id}/funnels:
    get:
      summary: List funnels
      tags: [Funnels]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Funnels list }
    post:
      summary: Create funnel
      tags: [Funnels]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '201': { description: Created }

  /admin/projects/{id}/funnels/{funnelId}/analysis:
    get:
      summary: Funnel analysis with drop-off rates
      tags: [Funnels]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: funnelId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: filter
          in: query
          schema: { type: string, default: '7d' }
      responses:
        '200': { description: Funnel analysis }

  /admin/projects/{id}/segments:
    get:
      summary: List user segments
      tags: [Segments]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Segments list }
    post:
      summary: Create segment with AND/OR filters
      tags: [Segments]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SegmentRequest' }
      responses:
        '201': { description: Created }

  /admin/projects/{id}/segments/{segmentId}/analysis:
    get:
      summary: Segment analysis
      tags: [Segments]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: segmentId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: filter
          in: query
          schema: { type: string, default: '7d' }
      responses:
        '200': { description: Segment analysis }

  /admin/projects/{id}/rotate-api-key:
    post:
      summary: Rotate project API key
      description: Generates a new 64-character hex API key for the project. The old key stops working immediately. Update your tracker script with the new key.
      tags: [Projects]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: New API key generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  apiKey: { type: string, description: The new API key (64 hex chars) }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404':
          description: Project not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiError' }

  /admin/projects/{id}/retention-preview:
    get:
      summary: Data retention dry-run preview
      description: Returns how many events would be deleted if retention is set to N days. Read-only — no data is deleted.
      tags: [Projects]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: days
          in: query
          required: true
          schema: { type: integer, minimum: 1 }
          description: Simulate deleting events older than this many days
      responses:
        '200':
          description: Preview result
          content:
            application/json:
              schema:
                type: object
                properties:
                  eventsToDelete: { type: integer, description: Number of events that would be deleted }
                  oldestEvent: { type: string, description: Timestamp of the oldest event in the project, or empty string }
        '400':
          description: Missing or invalid days parameter
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiError' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /admin/projects/{id}/realtime-count:
    get:
      summary: Active visitor count (last 5 minutes)
      description: Returns the number of distinct visitors who sent events in the last 5 minutes. Not cached.
      tags: [Analytics]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Active visitor count
          content:
            application/json:
              schema:
                type: object
                properties:
                  activeVisitors: { type: integer }
                  timestamp: { type: string, format: date-time }
        '400': { description: Invalid project ID }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /admin/projects/{id}/globe:
    get:
      summary: Globe visualization data
      description: Returns aggregated visitor locations grouped by rounded coordinates for globe rendering. Use `range=realtime` for live data (not cached), or a time range for cached results.
      tags: [Analytics]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: range
          in: query
          schema: { type: string, enum: [realtime, 1m, 1h, 1d], default: realtime }
      responses:
        '200':
          description: Globe data
          content:
            application/json:
              schema: { $ref: '#/components/schemas/GlobeData' }
        '400': { description: Invalid project ID }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /admin/projects/{id}/demo-data:
    post:
      summary: Generate demo analytics data
      description: Inserts realistic synthetic events into the project for testing and demonstration. Also seeds example goals, funnels, and segments if none exist. Admin role required.
      tags: [Projects]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                count: { type: integer, minimum: 0, maximum: 3000, default: 500, description: Number of events to generate }
                timeScope: { type: integer, minimum: 1, default: 30, description: Spread events over this many past days }
      responses:
        '200':
          description: Generation complete
          content:
            application/json:
              schema:
                type: object
                properties:
                  generated: { type: integer }
                  success: { type: boolean }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /admin/projects/{id}/goals/{goalId}:
    put:
      summary: Update conversion goal
      description: Update goal name, type, match value, or active status.
      tags: [Goals]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: goalId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                goalType: { type: string, enum: [url, event] }
                matchValue: { type: string }
                isActive: { type: boolean }
      responses:
        '200': { description: Goal updated }
        '400': { description: Invalid input }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    delete:
      summary: Delete conversion goal
      tags: [Goals]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: goalId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204': { description: Goal deleted }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /admin/projects/{id}/funnels/{funnelId}:
    delete:
      summary: Delete funnel and all its steps
      tags: [Funnels]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: funnelId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204': { description: Funnel deleted }
        '404': { description: Funnel not found }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /admin/projects/{id}/segments/{segmentId}:
    delete:
      summary: Delete user segment
      tags: [Segments]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: segmentId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204': { description: Segment deleted }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /admin/projects/{id}/webhooks:
    get:
      summary: List webhooks
      tags: [Webhooks]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: List of webhooks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WebhookResponse'
    post:
      summary: Create webhook
      tags: [Webhooks]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWebhookRequest'
      responses:
        '201':
          description: Webhook created (includes secret, shown only once)
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string, format: uuid }
                  secret: { type: string }
                  success: { type: boolean }
        '400': { description: Invalid URL (must use HTTPS) }

  /admin/projects/{id}/webhooks/{webhookId}:
    delete:
      summary: Delete webhook
      tags: [Webhooks]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: webhookId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204': { description: Webhook deleted }
        '404': { description: Webhook not found }

  /admin/projects/{id}/webhooks/{webhookId}/deliveries:
    get:
      summary: List webhook deliveries
      tags: [Webhooks]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: webhookId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Last 50 deliveries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WebhookDeliveryResponse'
        '404': { description: Webhook not found }

  /admin/projects/{id}/webhooks/{webhookId}/test:
    post:
      summary: Send test webhook
      tags: [Webhooks]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: webhookId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Test webhook queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  message: { type: string }
        '404': { description: Webhook not found }

  # ── Email Reports ──────────────────────────────────────────────

  /admin/projects/{id}/email-reports:
    get:
      summary: List email reports
      tags: [Email Reports]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: List of email report schedules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EmailReportResponse'
    post:
      summary: Create email report schedule
      tags: [Email Reports]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEmailReportRequest'
      responses:
        '201':
          description: Email report created
        '400': { description: Validation error }

  /admin/projects/{id}/email-reports/{reportId}:
    put:
      summary: Update email report
      tags: [Email Reports]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: reportId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                isActive: { type: boolean }
                schedule: { type: string, enum: [DAILY, WEEKLY, MONTHLY] }
      responses:
        '200': { description: Report updated }
        '404': { description: Report not found }
    delete:
      summary: Delete email report
      tags: [Email Reports]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: reportId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204': { description: Report deleted }
        '404': { description: Report not found }

  /admin/projects/{id}/email-reports/{reportId}/test:
    post:
      summary: Send test email report
      tags: [Email Reports]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: reportId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Test email queued }
        '400': { description: SMTP not configured }
        '404': { description: Report not found }

  /admin/smtp/status:
    get:
      summary: Get SMTP configuration status
      tags: [Email Reports]
      responses:
        '200':
          description: SMTP status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SmtpStatusResponse'

  # ── Revenue Analytics ──────────────────────────────────────────

  /admin/projects/{id}/revenue:
    get:
      summary: Revenue statistics
      tags: [Revenue]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: filter
          in: query
          schema: { type: string, default: '7d', enum: ['24h', '3d', '7d', '30d', '365d'] }
      responses:
        '200':
          description: Revenue stats with period comparison
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RevenueStats'

  /admin/projects/{id}/revenue/breakdown:
    get:
      summary: Revenue by event type
      tags: [Revenue]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: filter
          in: query
          schema: { type: string, default: '7d' }
      responses:
        '200':
          description: Revenue grouped by event name
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RevenueByEvent'

  /admin/projects/{id}/revenue/attribution:
    get:
      summary: Revenue attribution by source
      tags: [Revenue]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: filter
          in: query
          schema: { type: string, default: '7d' }
      responses:
        '200':
          description: Revenue attributed to referrer sources and UTM campaigns
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RevenueAttribution'

  # ── Widget Endpoints ─────────────────────────────────────────

  /widget/realtime:
    get:
      summary: Active visitor count widget
      description: Returns distinct visitors active in the last 5 minutes. Cached for 60 seconds. No authentication required — use your project API key.
      tags: [Widgets]
      parameters:
        - name: key
          in: query
          required: true
          schema: { type: string }
          description: Project API key (tracking ID)
      responses:
        '200':
          description: Active visitor count
          content:
            application/json:
              schema:
                type: object
                properties:
                  activeVisitors: { type: integer }
                  timestamp: { type: string, format: date-time }
        '404': { description: Invalid API key }
        '429': { description: Rate limit exceeded }

  /widget/pageviews:
    get:
      summary: Page view counter widget
      description: Returns total page views for the given period. Cached for 60 seconds.
      tags: [Widgets]
      parameters:
        - name: key
          in: query
          required: true
          schema: { type: string }
        - name: filter
          in: query
          schema: { type: string, enum: ['24h', '7d', '30d'], default: '7d' }
      responses:
        '200':
          description: Page view count
          content:
            application/json:
              schema:
                type: object
                properties:
                  pageviews: { type: integer }
                  period: { type: string }
        '404': { description: Invalid API key }
        '429': { description: Rate limit exceeded }

  /widget/toppages:
    get:
      summary: Top pages widget
      description: Returns the most visited pages ordered by view count. Cached for 60 seconds.
      tags: [Widgets]
      parameters:
        - name: key
          in: query
          required: true
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 20, default: 5 }
        - name: filter
          in: query
          schema: { type: string, enum: ['24h', '7d', '30d'], default: '7d' }
      responses:
        '200':
          description: Top pages list
          content:
            application/json:
              schema:
                type: object
                properties:
                  pages:
                    type: array
                    items: { $ref: '#/components/schemas/TopPage' }
        '404': { description: Invalid API key }
        '429': { description: Rate limit exceeded }

  /widget/sparkline:
    get:
      summary: 7-day sparkline widget
      description: Returns daily page view counts for the last 7 days. Suitable for trend charts. Cached for 60 seconds.
      tags: [Widgets]
      parameters:
        - name: key
          in: query
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Sparkline data
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { type: integer }
                  labels:
                    type: array
                    items: { type: string }
        '404': { description: Invalid API key }
        '429': { description: Rate limit exceeded }

components:
  schemas:
    ApiError:
      type: object
      required: [error, code]
      properties:
        error: { type: string }
        code: { type: string }
        details: { type: array, items: { type: string } }

    PageViewPayload:
      type: object
      required: [path, sessionId, type]
      properties:
        path: { type: string, maxLength: 512 }
        referrer: { type: string, nullable: true, maxLength: 512 }
        sessionId: { type: string, maxLength: 64 }
        type: { type: string, enum: ['pageview', 'heartbeat', 'custom'] }
        eventName: { type: string, nullable: true, maxLength: 100 }

    Project:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        domain: { type: string }
        apiKey: { type: string }

    ProjectStats:
      type: object
      properties:
        totalViews: { type: integer }
        uniqueVisitors: { type: integer }
        topPages: { type: array, items: { $ref: '#/components/schemas/TopPage' } }

    TopPage:
      type: object
      properties:
        path: { type: string }
        count: { type: integer }

    VisitSnippet:
      type: object
      properties:
        path: { type: string }
        timestamp: { type: string }
        city: { type: string, nullable: true }

    RawEventsResponse:
      type: object
      properties:
        events: { type: array, items: { $ref: '#/components/schemas/RawEvent' } }
        total: { type: integer }
        page: { type: integer }
        limit: { type: integer }

    RawEvent:
      type: object
      properties:
        id: { type: integer }
        timestamp: { type: string }
        eventType: { type: string }
        eventName: { type: string, nullable: true }
        path: { type: string }
        referrer: { type: string, nullable: true }
        country: { type: string, nullable: true }
        city: { type: string, nullable: true }
        browser: { type: string, nullable: true }
        os: { type: string, nullable: true }
        device: { type: string, nullable: true }
        sessionId: { type: string }
        duration: { type: integer }

    SegmentRequest:
      type: object
      required: [name, filters]
      properties:
        name: { type: string }
        description: { type: string, nullable: true }
        filters:
          type: array
          items:
            $ref: '#/components/schemas/SegmentFilter'

    SegmentFilter:
      type: object
      required: [field, operator, value]
      properties:
        field: { type: string, enum: ['browser', 'os', 'device', 'country', 'city', 'path', 'referrer', 'eventType'] }
        operator: { type: string, enum: ['equals', 'not_equals', 'contains', 'starts_with'] }
        value: { type: string }
        logic: { type: string, enum: ['AND', 'OR'], default: 'AND' }

    CreateWebhookRequest:
      type: object
      required: [url]
      properties:
        url: { type: string, format: uri, description: Must use HTTPS }
        events:
          type: array
          items: { type: string, enum: ['goal_conversion', 'traffic_spike'] }
          default: ['goal_conversion', 'traffic_spike']

    WebhookResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        projectId: { type: string, format: uuid }
        url: { type: string }
        events: { type: array, items: { type: string } }
        isActive: { type: boolean }
        createdAt: { type: string, format: date-time }

    WebhookDeliveryResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        eventType: { type: string }
        responseCode: { type: integer, nullable: true }
        attempt: { type: integer }
        status: { type: string, enum: ['pending', 'success', 'failed'] }
        createdAt: { type: string, format: date-time }
        deliveredAt: { type: string, format: date-time, nullable: true }

    CreateEmailReportRequest:
      type: object
      required: [recipientEmail]
      properties:
        recipientEmail: { type: string, format: email }
        schedule: { type: string, enum: [DAILY, WEEKLY, MONTHLY], default: WEEKLY }
        sendHour: { type: integer, minimum: 0, maximum: 23, default: 8 }
        subjectTemplate: { type: string }
        headerText: { type: string, nullable: true }
        footerText: { type: string, nullable: true }
        includeSections: { type: array, items: { type: string } }

    EmailReportResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        projectId: { type: string, format: uuid }
        recipientEmail: { type: string }
        schedule: { type: string }
        sendHour: { type: integer }
        isActive: { type: boolean }
        lastSentAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }

    SmtpStatusResponse:
      type: object
      properties:
        configured: { type: boolean }
        host: { type: string, nullable: true }
        port: { type: integer, nullable: true }
        from: { type: string, nullable: true }

    RevenueStats:
      type: object
      properties:
        totalRevenue: { type: number, format: double }
        transactions: { type: integer }
        averageOrderValue: { type: number, format: double }
        revenuePerVisitor: { type: number, format: double }
        previousRevenue: { type: number, format: double }
        previousTransactions: { type: integer }

    RevenueByEvent:
      type: object
      properties:
        eventName: { type: string }
        revenue: { type: number, format: double }
        transactions: { type: integer }
        avgValue: { type: number, format: double }

    RevenueAttribution:
      type: object
      properties:
        source: { type: string }
        revenue: { type: number, format: double }
        transactions: { type: integer }
        avgValue: { type: number, format: double }
        conversionRate: { type: number, format: double }

    UserResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        username: { type: string }
        role: { type: string, enum: [admin, viewer] }
        isActive: { type: boolean }
        createdAt: { type: string, format: date-time }

    GlobeVisitor:
      type: object
      properties:
        lat: { type: number, format: double }
        lng: { type: number, format: double }
        city: { type: string, nullable: true }
        country: { type: string, nullable: true }
        count: { type: integer }
        lastSeen: { type: string, format: date-time }

    GlobeData:
      type: object
      properties:
        visitors:
          type: array
          items: { $ref: '#/components/schemas/GlobeVisitor' }
        totalActive: { type: integer }

  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: SESSION
      description: Session cookie obtained via POST /api/login
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token obtained via POST /api/token

  responses:
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ApiError' }
    Forbidden:
      description: Admin role required
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ApiError' }

security:
  - sessionCookie: []
  - bearerAuth: []
